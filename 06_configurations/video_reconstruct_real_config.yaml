# 源视频列表（素材库）
source_videos:
  - /Users/zhangxu/work/项目/cutvideo/01_test_data_generation/test_videos/source_videos/video1_天赋变异后我无敌了_ep1.mp4
  - /Users/zhangxu/work/项目/cutvideo/01_test_data_generation/test_videos/source_videos/video2_开局饕餮血统我吞噬一切_ep1.mp4
